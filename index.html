<!doctype html>
<html lang="ar" dir="rtl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f1a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0a0f1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="color-scheme" content="dark" />
    <title>فهمني</title>
    <meta property="og:title" content="فهمني" />
    <meta property="og:description" content="منصة تعليمية متكاملة" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900;1000&family=Readex+Pro:wght@200;300;400;500;600;700&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;z-index:999999;background:red;color:white;padding:20px;width:100%;font-size:14px;white-space:pre-wrap;direction:ltr;text-align:left;max-height:100vh;overflow:auto;';
        d.innerHTML = '<b>FATAL ERROR:</b> ' + msg + '<br/><br/>' + (error && error.stack ? error.stack : 'No stack');
        if (document.body) document.body.appendChild(d);
        else document.documentElement.appendChild(d);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;z-index:999999;background:orange;color:black;padding:20px;width:100%;font-size:14px;white-space:pre-wrap;direction:ltr;text-align:left;max-height:100vh;overflow:auto;';
        d.innerHTML = '<b>UNHANDLED PROMISE:</b> ' + (event.reason && event.reason.stack ? event.reason.stack : event.reason);
        if (document.body) document.body.appendChild(d);
        else document.documentElement.appendChild(d);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
